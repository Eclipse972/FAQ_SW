<h1>Les différents zooms</h1>
<p>Au milieu du bord haut de la zone graphique, se trouve la barre d'outils graphique.</p>
<img src="/images/Autre/barre_outils_graphiques.png" style="height:30px" alt="barre d'outils graphiques">
<p>La première  icône est le "zoom au mieux" et la deuxième est "zoom fen&ecirc;tre". Elles sont reconnaissables à leur forme de loupe.</p>
<p>Cliquez dans le menu à gauche pour savoir comment les utiliser.</p>
